# Auto-provision the sovereign-mesh overview dashboard.
apiVersion: 1

providers:
  - name: visionclaw-staging
    orgId: 1
    folder: VisionClaw
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
