# ============================================================================
# AGENTIC WORKSTATION - Canonical Docker Compose v4.0
# ============================================================================
#
# VERSION:     4.0.0
# UPDATED:     2026-03-12
#
# This is the CANONICAL docker-compose for the unified agentic workstation.
#
# USAGE:
#   docker compose -f docker-compose.unified.yml up -d
#   ./build-unified.sh  (recommended)
#
# ============================================================================

services:
  # RuVector PostgreSQL — persistent AI memory with vector search + in-DB embeddings
  ruvector-postgres:
    image: ruvnet/ruvector-postgres:latest
    # NOTE: local build disabled — Rust build broken (missing aligned v0.4.3 crate).
    # Use pre-built image which includes ruvector.so with all 112 SQL functions.
    # build:
    #   context: ./ruvector-postgres
    #   dockerfile: Dockerfile
    container_name: ruvector-postgres
    hostname: ruvector-postgres

    environment:
      POSTGRES_USER: ${RUVECTOR_PG_USER:-ruvector}
      POSTGRES_PASSWORD: ${RUVECTOR_PG_PASSWORD:-ruvector}
      POSTGRES_DB: ${RUVECTOR_PG_DATABASE:-ruvector}
      FASTEMBED_CACHE_DIR: /opt/ruvector/models

    volumes:
      - ruvector-data:/var/lib/postgresql/data

    networks:
      docker_ragflow:
        aliases:
          - ruvector-postgres

    shm_size: 256m

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruvector -d ruvector"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4'
        reservations:
          memory: 512M
          cpus: '1'

  agentic-workstation:
    build:
      context: ..
      dockerfile: multi-agent-docker/Dockerfile.unified
      args:
        BUILDKIT_INLINE_CACHE: 1
      labels:
        - "com.turboflow.version=4.0.0"
        - "com.turboflow.canonical=true"

    container_name: agentic-workstation
    hostname: agentic-workstation

    depends_on:
      ruvector-postgres:
        condition: service_healthy

    # Service labels
    labels:
      com.turboflow.service: "agentic-workstation"
      com.turboflow.version: "4.0.0"
      com.turboflow.ruflo: "v4.0"
      com.turboflow.skills.count: "69"

    # NVIDIA GPU support
    runtime: nvidia
    shm_size: 32gb

    # Resource allocation for powerful host
    deploy:
      resources:
        limits:
          memory: 64G
          cpus: '32'
        reservations:
          memory: 16G
          cpus: '8'
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, graphics, display]

    # Network configuration - join ragflow network
    networks:
      docker_ragflow:
        aliases:
          - agentic-workstation.ragflow
          - agentic-workstation.local

    # Port mappings (exposed to LAN)
    ports:
      - "2222:22"      # SSH (host 2222 -> container 22 to avoid conflicts)
      - "5901:5901"    # VNC
      - "8080:8080"    # code-server (Web IDE)
      - "9090:9090"    # Management API
      # Port 9600 (Z.AI) is NOT exposed - internal ragflow network only

    # Volume mounts for persistence
    volumes:
      # Primary workspaces
      - workspace:/home/devuser/workspace:rw
      - agents:/home/devuser/agents:rw

      # Host Claude config (read-write mount - single source of truth)
      - ${HOST_CLAUDE_DIR:-${HOME}/.claude}:/home/devuser/.claude:rw

      # Host Claude desktop config (for additional config)
      - ${HOME}/.config/claude:/home/devuser/.config/claude:rw

      # User-specific workspaces
      - gemini-workspace:/home/gemini-user/workspace:rw
      - openai-workspace:/home/openai-user/workspace:rw

      # Shared resources
      - model-cache:/home/devuser/models:rw
      - logs:/var/log:rw

      # External project directories (multiple projects supported)
      # PROJECT_DIR   -> /home/devuser/workspace/project
      # PROJECT_DIR_2 -> /home/devuser/workspace/project2
      # ... up to PROJECT_DIR_10
      - ${PROJECT_DIR:-/tmp/empty}:/home/devuser/workspace/project:rw
      - ${PROJECT_DIR_2:-/tmp/empty}:/home/devuser/workspace/project2:rw
      - ${PROJECT_DIR_3:-/tmp/empty}:/home/devuser/workspace/project3:rw
      - ${PROJECT_DIR_4:-/tmp/empty}:/home/devuser/workspace/project4:rw
      - ${PROJECT_DIR_5:-/tmp/empty}:/home/devuser/workspace/project5:rw
      - ${PROJECT_DIR_6:-/tmp/empty}:/home/devuser/workspace/project6:rw
      - ${PROJECT_DIR_7:-/tmp/empty}:/home/devuser/workspace/project7:rw
      - ${PROJECT_DIR_8:-/tmp/empty}:/home/devuser/workspace/project8:rw
      - ${PROJECT_DIR_9:-/tmp/empty}:/home/devuser/workspace/project9:rw
      - ${PROJECT_DIR_10:-/tmp/empty}:/home/devuser/workspace/project10:rw

      # X11 socket for GUI apps (Xwayland compatibility)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # Docker socket for Docker Manager skill (inter-container control)
      # SECURITY WARNING: RW access enables container escapes - required for skill functionality
      # Consider using socket proxy (socat) with limited API access in production
      - /var/run/docker.sock:/var/run/docker.sock:rw

      # SSH credentials (directory mount - handles any key type: ed25519, rsa, ecdsa)
      - ${HOME}/.ssh:/home/devuser/.ssh-host:ro

    # Environment variables from .env
    environment:
      # Claude Code auto-update prevention (2.1.15 burns excessive tokens)
      DISABLE_AUTOUPDATER: "1"

      # Display
      DISPLAY: ":1"

      # Agent Teams (V4 — enables multi-agent coordination)
      CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"

      # NVIDIA GPU Configuration (PyTorch bundles its own CUDA libraries)
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics,display
      __GLX_VENDOR_LIBRARY_NAME: nvidia
      __NV_PRIME_RENDER_OFFLOAD: 1
      __VK_LAYER_NV_optimus: NVIDIA_only

      # API Keys
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ORG_ID: ${OPENAI_ORG_ID:-}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-gpt-5.4}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_GEMINI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}

      # OpenMontage / Media Production
      FAL_KEY: ${FAL_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      SUNO_API_KEY: ${SUNO_API_KEY:-}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY:-}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY:-}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      PIXABAY_API_KEY: ${PIXABAY_API_KEY:-}
      OPENROUTER_KEY: ${OPENROUTER_KEY:-}
      REMOVEBG_API_KEY: ${REMOVEBG_API_KEY:-}

      # Social / Research MCP
      LINKEDIN_TIMEOUT: ${LINKEDIN_TIMEOUT:-5000}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USERNAME: ${REDDIT_USERNAME:-}
      REDDIT_PASSWORD: ${REDDIT_PASSWORD:-}

      # Defense Security MCP
      DEFENSE_MCP_DRY_RUN: ${DEFENSE_MCP_DRY_RUN:-true}
      DEFENSE_MCP_REQUIRE_CONFIRMATION: ${DEFENSE_MCP_REQUIRE_CONFIRMATION:-true}
      DEFENSE_MCP_ALLOWED_DIRS: ${DEFENSE_MCP_ALLOWED_DIRS:-/tmp,/home,/var/log}
      DEFENSE_MCP_LOG_LEVEL: ${DEFENSE_MCP_LOG_LEVEL:-info}

      # Z.AI Configuration (separate from Claude CLI)
      # ZAI_URL: Use localhost:9600 for internal supervisord, or claude-zai:9600 for external container
      ZAI_ANTHROPIC_API_KEY: ${ZAI_ANTHROPIC_API_KEY:-}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/anthropic}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_URL: ${ZAI_URL:-http://localhost:9600}
      ZAI_CONTAINER_URL: ${ZAI_URL:-http://localhost:9600}
      # Set ZAI_INTERNAL=false to disable internal Z.AI (when using external claude-zai container)
      ZAI_INTERNAL: ${ZAI_INTERNAL:-true}
      CLAUDE_WORKER_POOL_SIZE: ${CLAUDE_WORKER_POOL_SIZE:-4}
      CLAUDE_MAX_QUEUE_SIZE: ${CLAUDE_MAX_QUEUE_SIZE:-50}

      # DeepSeek API
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}

      # Private Local LLM (Nemotron 3 120B via llama.cpp OpenAI-compatible API)
      LOCAL_LLM_HOST: ${LOCAL_LLM_HOST:-192.168.2.48}
      LOCAL_LLM_PORT: ${LOCAL_LLM_PORT:-8080}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-NVIDIA-Nemotron-3-Super-120B-A12B-UD-IQ4_XS-00001-of-00003.gguf}
      LOCAL_LLM_CONTEXT: ${LOCAL_LLM_CONTEXT:-262144}
      LOCAL_LLM_API_URL: http://${LOCAL_LLM_HOST:-192.168.2.48}:${LOCAL_LLM_PORT:-8080}/v1

      # RuVector PostgreSQL Memory (external centralized storage)
      RUVECTOR_PG_HOST: ${RUVECTOR_PG_HOST:-ruvector-postgres}
      RUVECTOR_PG_PORT: ${RUVECTOR_PG_PORT:-5432}
      RUVECTOR_PG_USER: ${RUVECTOR_PG_USER:-ruvector}
      RUVECTOR_PG_PASSWORD: ${RUVECTOR_PG_PASSWORD:-ruvector}
      RUVECTOR_PG_DATABASE: ${RUVECTOR_PG_DATABASE:-ruvector}
      RUVECTOR_USE_EXTERNAL: ${RUVECTOR_USE_EXTERNAL:-true}

      # Management API (REQUIRED: Set MANAGEMENT_API_KEY in .env or environment)
      # WARNING: No default - service will reject requests without valid key
      MANAGEMENT_API_KEY: ${MANAGEMENT_API_KEY:?MANAGEMENT_API_KEY must be set}
      MANAGEMENT_API_PORT: 9090
      MANAGEMENT_API_HOST: 0.0.0.0

      # Claude Telegram Mirror (ctm) — bidirectional Claude Code <-> Telegram bridge
      # Set TELEGRAM_MIRROR=true to auto-start the daemon via supervisord
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_MIRROR: ${TELEGRAM_MIRROR:-false}
      # Optional: LLM-backed tool summarization (e.g. Z.AI endpoint or Anthropic API)
      CTM_LLM_SUMMARIZE_URL: ${CTM_LLM_SUMMARIZE_URL:-}
      CTM_LLM_API_KEY: ${CTM_LLM_API_KEY:-}

      # 3D Gaussian Splatting (LichtFeld Studio + COLMAP + SplatReady)
      LICHTFELD_EXECUTABLE: /opt/lichtfeld-src/build/LichtFeld-Studio
      LICHTFELD_MCP_ENDPOINT: http://127.0.0.1:45677/mcp
      VCPKG_ROOT: /opt/vcpkg

      # ComfyUI API Endpoints (inpainting / SAM3D)
      COMFYUI_API_ENDPOINT: http://192.168.2.48:3001
      COMFYUI_LOCAL_ENDPOINT: http://172.18.0.10:8188

      # System Configuration
      WORKSPACE: /home/devuser/workspace
      AGENTS_DIR: /home/devuser/agents
      ENABLE_DESKTOP: "true"
      GPU_ACCELERATION: "true"
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0,1,2}

      # Service toggles (all true by default)
      ENABLE_VNC: "true"
      ENABLE_SSH: "true"
      ENABLE_MANAGEMENT_API: "true"

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-production}

      # PostgreSQL connection string (for psycopg compatibility)
      RUVECTOR_PG_CONNINFO: "host=${RUVECTOR_PG_HOST:-ruvector-postgres} port=${RUVECTOR_PG_PORT:-5432} user=${RUVECTOR_PG_USER:-ruvector} password=${RUVECTOR_PG_PASSWORD:-ruvector} dbname=${RUVECTOR_PG_DATABASE:-ruvector}"

    # Security capabilities
    cap_add:
      - SYS_ADMIN      # Required for Chromium and some GUI apps
      - NET_ADMIN      # Network management
      - SYS_PTRACE     # Debugging

    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined

    # GPU device access
    devices:
      - /dev/dri:/dev/dri                           # Intel/AMD GPU
      - /dev/nvidia0:/dev/nvidia0                   # NVIDIA GPU 0
      - /dev/nvidiactl:/dev/nvidiactl               # NVIDIA control
      - /dev/nvidia-uvm:/dev/nvidia-uvm             # NVIDIA unified memory
      - /dev/nvidia-modeset:/dev/nvidia-modeset     # NVIDIA modesetting

    # Health check (extended start_period for slow init)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    # Restart policy
    restart: unless-stopped

    # DNS configuration
    dns:
      - 8.8.8.8
      - 8.8.4.4

    # Extra hosts
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ============================================================================
# Networks
# ============================================================================

networks:
  docker_ragflow:
    external: true
    name: docker_ragflow

# ============================================================================
# Volumes
# ============================================================================

volumes:
  ruvector-data:
    external: true
    name: ruvector_postgres_data_v2
  workspace:
    driver: local
  agents:
    driver: local
  gemini-workspace:
    driver: local
  openai-workspace:
    driver: local
  model-cache:
    driver: local
  logs:
    driver: local
