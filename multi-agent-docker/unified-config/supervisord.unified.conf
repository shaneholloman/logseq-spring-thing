[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
user=root

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# ============================================================================
# PostgreSQL Database (Port 5432) - RuVector Vector Storage
# DISABLED: Using external ruvector-postgres on docker_ragflow network instead
# Start manually if needed: supervisorctl start postgresql
# ============================================================================

[program:postgresql]
command=/usr/bin/postgres -D /var/lib/postgres/data
user=postgres
environment=PGDATA="/var/lib/postgres/data"
autostart=false
autorestart=true
priority=50
stdout_logfile=/var/log/postgresql.log
stderr_logfile=/var/log/postgresql.error.log
stopasgroup=true
killasgroup=true

# ============================================================================
# Xvfb + x11vnc with VirtualGL (Port 5901) - 4K Resolution with GPU
# ============================================================================

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 2048x2048x24 -ac +extension GLX +render -noreset
user=root
environment=HOME="/root",DISPLAY=":1"
autostart=true
autorestart=true
priority=90
stdout_logfile=/var/log/xvfb.log
stderr_logfile=/var/log/xvfb.error.log
stopasgroup=true
killasgroup=true

[program:x11vnc]
command=/usr/bin/x11vnc -display :1 -rfbport 5901 -forever -shared -nopw -xkb -cursor arrow -cursor_drag -repeat -nowcr
user=root
environment=HOME="/root",DISPLAY=":1"
autostart=true
autorestart=true
priority=100
stdout_logfile=/var/log/x11vnc.log
stderr_logfile=/var/log/x11vnc.error.log
depends_on=xvfb
stopasgroup=true
killasgroup=true

# ============================================================================
# XFCE4 Desktop Environment (4K with Terminal Grid Autostart)
# ============================================================================

[program:openbox]
command=/usr/sbin/openbox
user=devuser
environment=HOME="/home/devuser",USER="devuser",DISPLAY=":1"
autostart=true
autorestart=true
priority=200
stdout_logfile=/var/log/openbox.log
stderr_logfile=/var/log/openbox.error.log
depends_on=x11vnc
startsecs=5
stopasgroup=true
killasgroup=true

[program:tint2]
command=/usr/sbin/tint2
user=devuser
environment=HOME="/home/devuser",USER="devuser",DISPLAY=":1"
autostart=true
autorestart=true
priority=210
stdout_logfile=/var/log/tint2.log
stderr_logfile=/var/log/tint2.error.log
depends_on=openbox
startsecs=3
stopasgroup=true
killasgroup=true

# ============================================================================
# Terminal Grid Autostart (7 kitty terminals in grid layout)
# ============================================================================

[program:terminal-grid]
command=/home/devuser/.config/autostart-terminals.sh
user=devuser
environment=HOME="/home/devuser",USER="devuser",DISPLAY=":1",DBUS_SESSION_BUS_ADDRESS="unix:path=/run/user/1000/bus",LIBGL_ALWAYS_SOFTWARE="1",GALLIUM_DRIVER="llvmpipe"
autostart=true
autorestart=false
priority=300
stdout_logfile=/var/log/terminal-grid.log
stderr_logfile=/var/log/terminal-grid.error.log
depends_on=openbox
startsecs=0

# ============================================================================
# SSH Server (Port 22)
# ============================================================================

[program:sshd]
command=/usr/sbin/sshd -D -e
user=root
autostart=true
autorestart=true
startretries=5
stopasgroup=true
killasgroup=true
priority=50
stdout_logfile=/var/log/sshd.log
stderr_logfile=/var/log/sshd.error.log

# ============================================================================
# Management API (Port 9090)
# ============================================================================

[program:management-api]
command=/usr/local/bin/node /opt/management-api/server.js
directory=/opt/management-api
user=devuser
environment=HOME="/home/devuser",PORT="9090",NODE_ENV="production"
autostart=true
autorestart=true
startretries=5
stopasgroup=true
killasgroup=true
priority=300
stdout_logfile=/var/log/management-api.log
stderr_logfile=/var/log/management-api.error.log

# ============================================================================
# code-server (Port 8080)
# ============================================================================

[program:code-server]
command=/usr/bin/code-server --bind-addr 0.0.0.0:8080 --auth none /home/devuser/workspace
user=devuser
environment=HOME="/home/devuser",USER="devuser"
autostart=true
autorestart=true
startretries=5
stopasgroup=true
killasgroup=true
priority=400
stdout_logfile=/var/log/code-server.log
stderr_logfile=/var/log/code-server.error.log

# ============================================================================
# Claude Z.AI Service (Port 9600 - Internal Only)
# Runs as zai-user for isolation
# NOTE: Set ZAI_EXTERNAL=true in environment to disable (when using external container)
# ============================================================================

[program:claude-zai]
command=/usr/local/bin/node /opt/claude-zai/server.js
directory=/opt/claude-zai
user=zai-user
environment=HOME="/home/zai-user",PORT="9600",NODE_ENV="production"
autostart=%(ENV_ZAI_INTERNAL)s
autorestart=true
startretries=5
stopasgroup=true
killasgroup=true
priority=500
stdout_logfile=/var/log/claude-zai.log
stderr_logfile=/var/log/claude-zai.error.log

# ============================================================================
# MCP Gateway (TCP + WebSocket) - VisionFlow Integration
# Provides MCP TCP on port 9500 and WebSocket on port 3002
# ============================================================================

[program:mcp-gateway]
command=/usr/local/bin/node /opt/mcp-gateway/server.js
directory=/opt/mcp-gateway
user=devuser
environment=HOME="/home/devuser",MCP_TCP_PORT="9500",MCP_WS_PORT="3002",LOG_LEVEL="info"
autostart=true
autorestart=true
priority=150
stdout_logfile=/var/log/mcp-gateway.log
stderr_logfile=/var/log/mcp-gateway.error.log

