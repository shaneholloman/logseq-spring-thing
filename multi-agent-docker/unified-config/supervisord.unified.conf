# ============================================================================
# OpenAI Codex MCP Server (GPT-5.4)
# Exposes codex_generate and codex_review tools via MCP for cross-agent use
# Runs as devuser (skill files live under ~/.claude/skills which is devuser-owned)
# API isolation via OPENAI_API_KEY env var, not unix user
# ============================================================================

[program:openai-codex-mcp]
command=/usr/local/bin/node /home/devuser/.claude/skills/openai-codex/mcp-server/server.js
directory=/home/devuser/.claude/skills/openai-codex/mcp-server
user=devuser
environment=HOME="/home/devuser",USER="devuser",OPENAI_API_KEY="%(ENV_OPENAI_API_KEY)s",OPENAI_DEFAULT_MODEL="%(ENV_OPENAI_DEFAULT_MODEL)s"
autostart=true
autorestart=true
priority=605
stdout_logfile=/var/log/openai-codex-mcp.log
stderr_logfile=/var/log/openai-codex-mcp.error.log

# ============================================================================
# Gemini Flow Daemon (gemini-user)
# ============================================================================

[program:gemini-flow]
command=/usr/local/bin/gemini-flow mcp start
directory=/home/gemini-user/workspace
user=gemini-user
environment=HOME="/home/gemini-user",USER="gemini-user",MCP_SOCKET="/var/run/agentic-services/gemini-mcp.sock",GEMINI_FLOW_DATA_DIR="/home/gemini-user/.gemini-flow"
autostart=true
autorestart=true
priority=600
stdout_logfile=/var/log/gemini-flow.log
stderr_logfile=/var/log/gemini-flow.error.log

# ============================================================================
# Screensaver Disable (runs after XFCE4 starts)
# ============================================================================

[program:disable-screensaver]
command=/home/devuser/.config/disable-screensaver.sh
user=devuser
environment=HOME="/home/devuser",USER="devuser",DISPLAY=":1"
autostart=true
autorestart=false
priority=250
stdout_logfile=/var/log/disable-screensaver.log
stderr_logfile=/var/log/disable-screensaver.error.log
depends_on=openbox
startsecs=0

# ============================================================================
# tmux Workspace Auto-Start (devuser)
# Starts after a delay to ensure other services are ready
# ============================================================================

[program:tmux-autostart]
command=/bin/bash -c "sleep 15 && /home/devuser/.config/tmux-autostart.sh"
user=devuser
environment=HOME="/home/devuser",USER="devuser",WORKSPACE="/home/devuser/workspace",AGENTS_DIR="/home/devuser/agents"
autostart=true
autorestart=false
priority=900
stdout_logfile=/var/log/tmux-autostart.log
stderr_logfile=/var/log/tmux-autostart.error.log
depends_on=openbox

# ============================================================================
# Management API Health Check (one-time verification)
# Runs 10 seconds after startup to verify Management API is responding
# ============================================================================

[program:management-api-healthcheck]
command=/bin/bash /opt/scripts/verify-management-api.sh
user=root
environment=MANAGEMENT_API_HOST="localhost",MANAGEMENT_API_PORT="9090"
autostart=true
autorestart=false
startsecs=0
priority=950
stdout_logfile=/var/log/management-api-healthcheck.log
stderr_logfile=/var/log/management-api-healthcheck.error.log

# ============================================================================
# DBus Daemon (required for desktop apps)
# ============================================================================

[program:dbus]
command=/usr/bin/dbus-daemon --system --nofork
user=root
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/dbus.log
stderr_logfile=/var/log/dbus.error.log

[program:dbus-user]
command=/usr/bin/dbus-daemon --session --nofork --address=unix:path=/run/user/1000/bus
user=devuser
environment=HOME="/home/devuser",USER="devuser",XDG_RUNTIME_DIR="/run/user/1000"
autostart=true
autorestart=true
priority=15
stdout_logfile=/var/log/dbus-user.log
stderr_logfile=/var/log/dbus-user.error.log

# ============================================================================
# HTTPS Bridge Proxy (Bridges https://localhost:3001 -> host http:3001)
# Enables secure browser connections to host development servers
# ============================================================================

[program:https-bridge]
command=/usr/local/bin/node /opt/https-bridge/https-proxy.js
directory=/opt/https-bridge
user=devuser
environment=HOME="/home/devuser",HOST_IP="host.docker.internal",HTTPS_PORT="3001",TARGET_PORT="3001",CERT_DIR="/opt/https-bridge"
autostart=true
autorestart=true
priority=350
stdout_logfile=/var/log/https-bridge.log
stderr_logfile=/var/log/https-bridge.error.log

# ============================================================================
# Local LLM Proxy - Anthropic-to-OpenAI translation for Nemotron 3 120B
# Allows Claude CLI to communicate with llama.cpp via ANTHROPIC_BASE_URL
# ============================================================================

[program:local-llm-proxy]
command=/usr/local/bin/node /opt/scripts/local-llm-proxy.mjs
directory=/home/local-private
user=local-private
environment=HOME="/home/local-private",LOCAL_LLM_HOST="%(ENV_LOCAL_LLM_HOST)s",LOCAL_LLM_PORT="%(ENV_LOCAL_LLM_PORT)s",LOCAL_LLM_MODEL="%(ENV_LOCAL_LLM_MODEL)s",PROXY_PORT="3100",NODE_ENV="production",NODE_PATH="/usr/local/lib/node_modules"
autostart=false
autorestart=true
priority=360
stdout_logfile=/var/log/local-llm-proxy.log
stderr_logfile=/var/log/local-llm-proxy.error.log

# ============================================================================
# Claude Telegram Mirror (ctm) — Bidirectional Claude Code <-> Telegram
# Daemon bridges hook events to Telegram and relays Telegram replies to CLI.
# Set TELEGRAM_MIRROR=true in .env + provide TELEGRAM_BOT_TOKEN & TELEGRAM_CHAT_ID
# ============================================================================

[program:claude-telegram-mirror]
command=/usr/local/bin/ctm start
directory=/home/devuser
user=devuser
environment=HOME="/home/devuser",RUST_LOG="info",TELEGRAM_MIRROR="%(ENV_TELEGRAM_MIRROR)s",TELEGRAM_BOT_TOKEN="%(ENV_TELEGRAM_BOT_TOKEN)s",TELEGRAM_CHAT_ID="%(ENV_TELEGRAM_CHAT_ID)s",CTM_LLM_SUMMARIZE_URL="%(ENV_CTM_LLM_SUMMARIZE_URL)s",CTM_LLM_API_KEY="%(ENV_CTM_LLM_API_KEY)s"
autostart=%(ENV_TELEGRAM_MIRROR)s
autorestart=true
priority=550
stdout_logfile=/var/log/claude-telegram-mirror.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/claude-telegram-mirror.error.log
stderr_logfile_maxbytes=5MB

[program:host-webserver-debug-mcp]
command=/usr/local/bin/node /home/devuser/.claude/skills/host-webserver-debug/mcp-server/server.js
directory=/home/devuser/.claude/skills/host-webserver-debug/mcp-server
user=devuser
environment=HOME="/home/devuser",DISPLAY=":1",HOST_GATEWAY_IP="host.docker.internal",SCREENSHOT_DIR="/tmp/screenshots"
autostart=false
autorestart=true
priority=519
stdout_logfile=/var/log/host-webserver-debug-mcp.log
stderr_logfile=/var/log/host-webserver-debug-mcp.error.log
