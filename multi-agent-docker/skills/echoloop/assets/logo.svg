<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0" />
    </linearGradient>
    <!-- Subtle noise filter for texture -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bgGrad)" />
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="none" stroke="#00d4aa" stroke-width="2" stroke-opacity="0.2" />

  <!-- Outer sonar ring 3 (faintest) -->
  <circle cx="256" cy="240" r="170" fill="none" stroke="#00d4aa" stroke-width="1.5" stroke-opacity="0.1" stroke-dasharray="8 12" />

  <!-- Outer sonar ring 2 -->
  <circle cx="256" cy="240" r="135" fill="none" stroke="#00d4aa" stroke-width="2" stroke-opacity="0.18" />

  <!-- Outer sonar ring 1 -->
  <circle cx="256" cy="240" r="100" fill="none" stroke="#00d4aa" stroke-width="2.5" stroke-opacity="0.3" />

  <!-- Glow behind the infinity loop -->
  <ellipse cx="256" cy="240" rx="75" ry="45" fill="url(#glowGrad)" />

  <!-- The infinity loop / ∞ — the "Loop" in EchoLoop -->
  <g filter="url(#softGlow)">
    <path d="M 256 215
             C 220 185, 175 185, 175 220
             C 175 255, 220 270, 256 240
             C 292 210, 337 185, 337 220
             C 337 255, 292 270, 256 240"
          fill="none"
          stroke="url(#accentGrad)"
          stroke-width="7"
          stroke-linecap="round"
          stroke-linejoin="round" />
  </g>

  <!-- Small "signal dot" at center of infinity — the echo origin -->
  <circle cx="256" cy="228" r="6" fill="#00d4aa" />
  <circle cx="256" cy="228" r="10" fill="none" stroke="#00d4aa" stroke-width="1.5" stroke-opacity="0.4" />

  <!-- Three audio wave bars on the left (incoming audio) -->
  <g stroke="#00d4aa" stroke-width="3" stroke-linecap="round" stroke-opacity="0.5">
    <line x1="95" y1="220" x2="95" y2="260" />
    <line x1="108" y1="210" x2="108" y2="270" />
    <line x1="121" y1="225" x2="121" y2="255" />
  </g>

  <!-- Three audio wave bars on the right (output / insight) -->
  <g stroke="#00d4aa" stroke-width="3" stroke-linecap="round" stroke-opacity="0.5">
    <line x1="391" y1="225" x2="391" y2="255" />
    <line x1="404" y1="210" x2="404" y2="270" />
    <line x1="417" y1="220" x2="417" y2="260" />
  </g>

  <!-- Wordmark -->
  <text x="256" y="370" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Helvetica, Arial, sans-serif" font-weight="700" font-size="52" fill="#e0e0e0" letter-spacing="3">
    Echo<tspan fill="#00d4aa">Loop</tspan>
  </text>

  <!-- Tagline -->
  <text x="256" y="405" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Helvetica, Arial, sans-serif" font-weight="400" font-size="16" fill="#888888" letter-spacing="5">
    MEETING SUPERPOWERS
  </text>
</svg>
