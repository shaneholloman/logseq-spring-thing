# research_wiki.toml — Karpathy-pattern research wikis (ADR-069 D2)
#
# Tuned for densely cross-linked personal wikis used for research note-taking.
# These graphs are characterised by:
#
#   - High link density:  Typical nodes have 5-15 outgoing wikilinks
#                         (vs. 1-3 for a standard Logseq vault).
#   - Flat hierarchy:     Few block-parent edges; most structure comes
#                         from wikilinks and tags.
#   - Citation networks:  cited_by edges form citation subgraphs.
#   - Hub pages:          Index/MOC pages with 50+ links act as hubs.
#
# The layout goal is a "galaxy" aesthetic: dense interconnected clusters
# for topic areas, connected by weaker bridge links, with hub pages
# visually prominent at cluster centres.
#
# Tuning rationale:
#   - gravity:          -0.3 — moderate outward push prevents the dense
#                       link network from collapsing into a ball.
#   - central_gravity:  0.015 — moderate; keeps the galaxy centred.
#   - damping:          0.6 — balanced between convergence speed and
#                       layout stability.  Lower than default because
#                       dense graphs oscillate more.
#   - spring_k:         0.3 — soft springs.  With high link density,
#                       strong springs would crush nodes together.
#   - rest_length:      1.5 — longer than default to give the dense
#                       graph room to spread.
#   - repel_k:          90.0 — moderately strong to counteract the
#                       high spring count per node.

name = "research_wiki"
version = 1

[global]
gravity         = -0.3
central_gravity = 0.015
damping         = 0.6
dt              = 0.016
spring_k        = 0.3
rest_length     = 1.5
repel_k         = 90.0
max_velocity    = 5.0
max_force       = 10.0

# ── Knowledge edge kinds ──

[edge_kinds.wiki_link]
# Primary connective tissue.  In research wikis these are extremely
# dense, so the spring is kept soft to avoid node pileups.
spring_k            = 0.35
rest_length         = 1.5
repulsion_strength  = 0.0

[edge_kinds.block_parent]
# Relatively rare in flat research wikis, but when present should
# still cluster tightly.
spring_k            = 0.7
rest_length         = 0.5
repulsion_strength  = 0.0

[edge_kinds.block_ref]
# Transclusions.  Weaker than wikilinks.
spring_k            = 0.2
rest_length         = 2.0
repulsion_strength  = 0.0

[edge_kinds.tagged_with]
# Tags are the primary clustering mechanism in research wikis.
# Slightly stronger than wikilinks to form visible topic clusters.
spring_k            = 0.4
rest_length         = 1.2
repulsion_strength  = 0.0

[edge_kinds.cited_by]
# Citation edges.  Medium strength — citations indicate topical
# relevance and should pull papers/notes together.
spring_k            = 0.45
rest_length         = 1.3
repulsion_strength  = 0.0

# ── Semantic edge kinds ──

[edge_kinds.sub_class_of]
spring_k            = 0.6
rest_length         = 0.8
repulsion_strength  = 0.0

[edge_kinds.instance_of]
spring_k            = 0.5
rest_length         = 1.0
repulsion_strength  = 0.0

[edge_kinds.equivalent_to]
# Strong pull for equivalent concepts.
spring_k            = 0.8
rest_length         = 0.3
repulsion_strength  = 0.0

[edge_kinds.disjoint_with]
# Repulsive — push disjoint clusters apart.
spring_k            = -0.3
rest_length         = 2.5
repulsion_strength  = 0.3

[edge_kinds.same_as]
# Alias/synonym links.  Very strong pull; these are the same concept.
spring_k            = 0.85
rest_length         = 0.3
repulsion_strength  = 0.0

# ── Domain edge kinds (for interdisciplinary research) ──

[edge_kinds.bridges_to]
# Cross-domain bridge links.  Long rest length makes disciplinary
# boundaries visible in the layout.
spring_k            = 0.2
rest_length         = 3.0
repulsion_strength  = 0.0

[edge_kinds.has_part]
# Part-whole for concept decomposition.
spring_k            = 0.65
rest_length         = 0.6
repulsion_strength  = 0.0

[stability]
velocity_epsilon = 0.05     # moderate tolerance — dense graphs have residual
force_epsilon    = 0.005
max_iterations   = 50000
