# logseq_large.toml — Logseq vaults with 1 000–100 000 nodes (ADR-069 D2/D3)
#
# Matryca-derived preset, POST-CALIBRATION.
#
# ┌──────────────────────────────────────────────────────────────────────┐
# │ CALIBRATION NOTE                                                    │
# │                                                                     │
# │ Matryca's physics constants were tuned for vis-network pixel space  │
# │ (1px ≈ 1 unit).  VisionClaw operates in metre-scale WebGL space    │
# │ (1 unit ≈ 1 metre).  The raw matryca values are:                   │
# │                                                                     │
# │   gravity           = -50    (px)   → /100 → -0.5   (m)            │
# │   central_gravity   =  0.01         → kept  →  0.01               │
# │   damping           =  0.4          → kept  →  0.4                │
# │   spring_strength   =  0.08         → kept  →  0.08               │
# │   spring_length     = 100    (px)   → /100 →  1.0   (m)            │
# │   block_parent_rest = 30     (px)   → /100 →  0.3   (m)            │
# │   wiki_link_rest    = 100    (px)   → /100 →  1.0   (m)            │
# │   block_ref_rest    = 150    (px)   → /100 →  1.5   (m)            │
# │                                                                     │
# │ Dimensionless ratios (damping, central_gravity, spring_k) pass     │
# │ through unchanged.  Length-scale values (gravity force, rest        │
# │ lengths) are divided by 100.                                       │
# └──────────────────────────────────────────────────────────────────────┘
#
# Tuning rationale:
#   - gravity:        -0.5 — repulsive global force spreads nodes.
#                     Matryca uses negative gravity for outward push.
#   - damping:        0.4 — much lower than default.  Large graphs need
#                     heavy damping to converge without oscillation.
#   - spring_k:       0.08 — soft springs.  With 10k+ edges the aggregate
#                     spring force is enormous; weak per-edge k keeps it
#                     manageable.
#   - repel_k:        80.0 — slightly less than default; the negative
#                     gravity already provides repulsion.
#   - stability:      Looser epsilon (0.1/0.01) tolerates residual motion
#                     — large graphs never fully settle, and that is fine
#                     ("force of life" aesthetic).

name = "logseq_large"
version = 1

[global]
gravity         = -0.5      # matryca: -50 (px) → /100
central_gravity = 0.01      # matryca: 0.01 (dimensionless)
damping         = 0.4       # matryca: 0.4  (dimensionless)
dt              = 0.016
spring_k        = 0.08      # matryca: 0.08 (dimensionless)
rest_length     = 1.0       # matryca: 100 (px) → /100
repel_k         = 80.0
max_velocity    = 5.0
max_force       = 10.0

# ── Knowledge edge kinds (matryca-calibrated) ──

[edge_kinds.block_parent]
# Tight parent-child hierarchy.  Blocks cluster directly under their page.
# matryca: rest=30px → 0.3m, spring_k=0.85 (tuned above global for hierarchy)
spring_k            = 0.85
rest_length         = 0.3
repulsion_strength  = 0.0

[edge_kinds.wiki_link]
# Primary cross-page links.  The backbone of Logseq graphs.
# matryca: rest=100px → 1.0m, spring_k=0.5 (medium attraction)
spring_k            = 0.5
rest_length         = 1.0
repulsion_strength  = 0.0

[edge_kinds.block_ref]
# Transclusion references.  Weak and long to avoid pulling distant content
# into tight clusters.
# matryca: rest=150px → 1.5m, spring_k=0.3 (weak cross-link)
spring_k            = 0.3
rest_length         = 1.5
repulsion_strength  = 0.0

[edge_kinds.tagged_with]
# Tag association.  Medium-weak spring groups tagged pages without
# dominating the layout.
spring_k            = 0.35
rest_length         = 1.2
repulsion_strength  = 0.0

[edge_kinds.cited_by]
# Citation links in research-oriented vaults.
spring_k            = 0.4
rest_length         = 1.3
repulsion_strength  = 0.0

# ── Semantic edge kinds (ontology overlay) ──

[edge_kinds.sub_class_of]
# OWL subclass hierarchy.  Moderate pull; these form the backbone of
# ontology trees when the vault includes structured knowledge.
spring_k            = 0.6
rest_length         = 0.7
repulsion_strength  = 0.0

[edge_kinds.instance_of]
spring_k            = 0.5
rest_length         = 0.8
repulsion_strength  = 0.0

[edge_kinds.equivalent_to]
# Strong pull — equivalent concepts should sit very close.
spring_k            = 0.8
rest_length         = 0.3
repulsion_strength  = 0.0

[edge_kinds.disjoint_with]
# Repulsive — disjoint classes should be pushed apart.
spring_k            = -0.3
rest_length         = 2.0
repulsion_strength  = 0.3

[stability]
velocity_epsilon = 0.1      # tolerates higher residual (force-of-life)
force_epsilon    = 0.01
max_iterations   = 50000
