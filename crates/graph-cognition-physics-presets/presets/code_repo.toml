# code_repo.toml — Source-code-derived graphs (ADR-069 D2)
#
# Optimised for call graphs, dependency trees, and module hierarchies
# extracted from source code repositories.  Key layout goals:
#
#   1. Tight module clustering:  Files in the same module sit close.
#   2. Strong inheritance attraction:  Class hierarchies are visually
#      obvious as vertical chains.
#   3. Weaker cross-module links:  Import/call edges between distant
#      modules are long, making architectural boundaries visible.
#
# Tuning rationale:
#   - central_gravity:  0.02 — stronger than default to prevent module
#                       clusters from drifting apart in large codebases.
#   - damping:          0.9 — high damping for a stable, "architectural
#                       diagram" feel rather than organic motion.
#   - spring_k:         0.6 — stiffer than default; code graphs have
#                       well-defined structure that benefits from crisp
#                       positioning.
#   - rest_length:      0.8 — shorter default; code elements are
#                       semantically dense and benefit from compact layout.
#   - repel_k:          120.0 — stronger repulsion separates unrelated
#                       modules cleanly.
#   - max_velocity:     4.0 — lower cap; code graphs should settle
#                       quickly into a readable layout.

name = "code_repo"
version = 1

[global]
gravity         = 0.0001
central_gravity = 0.02
damping         = 0.9
dt              = 0.016
spring_k        = 0.6
rest_length     = 0.8
repel_k         = 120.0
max_velocity    = 4.0
max_force       = 8.0

# ── Structural edge kinds ──

[edge_kinds.contains]
# Module containment.  Very tight — files/classes within a module should
# sit in a compact cluster.
spring_k            = 0.85
rest_length         = 0.4
repulsion_strength  = 0.0

[edge_kinds.inherits_from]
# Inheritance hierarchy.  Strong pull with short rest length creates
# visible class trees.
spring_k            = 0.8
rest_length         = 0.5
repulsion_strength  = 0.0

[edge_kinds.implements]
# Interface implementation.  Slightly weaker than inherits_from;
# implementations may live in different modules.
spring_k            = 0.7
rest_length         = 0.6
repulsion_strength  = 0.0

[edge_kinds.composed_of]
# Composition relationship.  Tight clustering similar to containment.
spring_k            = 0.8
rest_length         = 0.5
repulsion_strength  = 0.0

[edge_kinds.nests]
# Nested classes/functions.  Very tight.
spring_k            = 0.9
rest_length         = 0.3
repulsion_strength  = 0.0

# ── Behavioral edge kinds ──

[edge_kinds.calls]
# Function call edges.  Medium attraction — callees should be near
# callers but not collapsed on top of them.
spring_k            = 0.6
rest_length         = 0.8
repulsion_strength  = 0.0

[edge_kinds.overrides]
# Method overrides.  Strong pull keeps the override chain visible.
spring_k            = 0.75
rest_length         = 0.5
repulsion_strength  = 0.0

[edge_kinds.triggers]
# Event triggers.  Weaker; triggers often cross module boundaries.
spring_k            = 0.4
rest_length         = 1.2
repulsion_strength  = 0.0

[edge_kinds.subscribes]
# Event subscriptions.  Similar to triggers — cross-module by nature.
spring_k            = 0.35
rest_length         = 1.3
repulsion_strength  = 0.0

# ── Dependency edge kinds ──

[edge_kinds.depends_on]
# Package/crate dependencies.  Medium spring — dependencies cluster but
# retain enough distance to see the boundary.
spring_k            = 0.55
rest_length         = 0.9
repulsion_strength  = 0.0

[edge_kinds.imports]
# Import/use statements.  Slightly stronger than depends_on; imports
# indicate tighter coupling.
spring_k            = 0.7
rest_length         = 0.6
repulsion_strength  = 0.0

[edge_kinds.requires]
# Hard requirements.
spring_k            = 0.6
rest_length         = 0.7
repulsion_strength  = 0.0

[edge_kinds.enables]
# Feature enablement.  Weaker link.
spring_k            = 0.4
rest_length         = 1.0
repulsion_strength  = 0.0

# ── Data Flow edge kinds ──

[edge_kinds.reads_from]
spring_k            = 0.45
rest_length         = 1.0
repulsion_strength  = 0.0

[edge_kinds.writes_to]
spring_k            = 0.45
rest_length         = 1.0
repulsion_strength  = 0.0

[edge_kinds.transforms_to]
spring_k            = 0.5
rest_length         = 0.9
repulsion_strength  = 0.0

[edge_kinds.pipes]
spring_k            = 0.5
rest_length         = 0.9
repulsion_strength  = 0.0

[stability]
velocity_epsilon = 0.01     # tight convergence for clean diagrams
force_epsilon    = 0.001
max_iterations   = 50000
