# default.toml — Existing VisionClaw baseline tuning (ADR-069 D2)
#
# This preset captures the original hand-tuned constants that have been
# running in production since the initial GPU physics launch.  It is the
# fallback for any graph topology that does not match a more specific preset.
#
# Rationale:
#   - gravity:        Near-zero; VisionClaw uses repulsion + springs, not
#                     downward gravity.  The tiny positive value prevents
#                     disconnected components from drifting to infinity.
#   - central_gravity: Weak centre pull keeps the graph near the origin
#                     without distorting the spring layout.
#   - damping:        0.85 gives smooth deceleration without oscillation.
#   - dt:             ~60 Hz physics tick (1/60 ≈ 0.016).
#   - spring_k:       Moderate stiffness.  Per-edge overrides in edge_kinds
#                     tables can raise or lower this.
#   - rest_length:    1.0 metre — the unit scale of the VC scene.
#   - repel_k:        100.0 balances the spring_k for ~500-node graphs.
#   - max_velocity/force:  Safety clamps to prevent exploding layouts.

name = "default"
version = 1

[global]
gravity         = 0.0001
central_gravity = 0.01
damping         = 0.85
dt              = 0.016
spring_k        = 0.5
rest_length     = 1.0
repel_k         = 100.0
max_velocity    = 5.0
max_force       = 10.0

# No per-edge-kind overrides for the generic default.
# The global spring_k / rest_length apply uniformly.

[stability]
velocity_epsilon = 0.01
force_epsilon    = 0.001
max_iterations   = 50000
